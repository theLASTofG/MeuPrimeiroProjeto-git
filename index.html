<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sniper Attack - Jogo em tela cheia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-page" id="gamePage">
        <section class="game-stage" id="gameStage" aria-label="Sniper Attack">
            <iframe
                id="game"
                title="Sniper Attack"
                frameborder="0"
                allow="autoplay; fullscreen; gamepad"
                allowfullscreen
                scrolling="no"
                src="https://html5.gamedistribution.com/rvvASMiM/9adda1ede521423cac11d8b2e7ccc039/index.html?gd_sdk_referrer_url=https%3A%2F%2Fpt.y8.com%2Fgames%2Fsniper_attack&amp;key=y8&amp;value=default&amp;gd_zone_config=eyJwYXJlbnRVUkwiOiJodHRwczovL3B0Lnk4LmNvbS9nYW1lcy9zbmlwZXJfYXR0YWNrIiwicGFyZW50RG9tYWluIjoicHQueTguY29tIiwidG9wRG9tYWluIjoicHQueTguY29tIiwiaGFzSW1wcmVzc2lvbiI6ZmFsc2UsImxvYWRlckVuYWJsZWQiOnRydWUsImhvc3QiOiJodG1sNS5nYW1lZGlzdHJpYnV0aW9uLmNvbSIsInZlcnNpb24iOiIxLjUuMTgifQ%253D%253D">
            </iframe>
        </section>

        <header class="hud" aria-label="Controles do jogo">
            <div>
                <p class="eyebrow">Meu Primeiro Projeto</p>
                <h1>Sniper Attack</h1>
            </div>
            <nav class="hud-actions" aria-label="Acoes">
                <button class="action-button" id="fullscreenButton" type="button">
                    Abrir em 100%
                </button>
                <a class="action-button action-button--ghost" id="openGame" href="https://html5.gamedistribution.com/rvvASMiM/9adda1ede521423cac11d8b2e7ccc039/index.html" target="_blank" rel="noopener noreferrer">
                    Nova aba
                </a>
            </nav>
        </header>
    </main>

    <script>
        const gameStage = document.getElementById("gameStage");
        const fullscreenButton = document.getElementById("fullscreenButton");

        async function toggleFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    await gameStage.requestFullscreen();
                    return;
                }

                await document.exitFullscreen();
            } catch (error) {
                fullscreenButton.textContent = "Use F11";
            }
        }

        fullscreenButton.addEventListener("click", toggleFullscreen);

        document.addEventListener("fullscreenchange", () => {
            fullscreenButton.textContent = document.fullscreenElement
                ? "Sair do 100%"
                : "Abrir em 100%";
        });
    </script>
</body>
</html>
